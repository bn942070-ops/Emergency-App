<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedRush - Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div class="card auth-card">
      <h1>🏥 MedRush</h1>
      <h2>Emergency Medical Assistance</h2>
      <input id="lemail" type="email" placeholder="Email Address">
      <input id="lpass" type="password" placeholder="Password">
      <button onclick="login()">Login</button>
      <button class="ghost" onclick="forgotPassword()">Forgot Password?</button>
      <button class="secondary" onclick="location.href='register.html'">Create New Account</button>
      <button class="ghost" onclick="location.href='about.html'">About Us</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
